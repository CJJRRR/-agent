    - beta
    - integration
    - hiring
    - benchmark
    - customer
    - 招聘
    - 集成
    - 客户
    - 测试版

competitors:
  - name: "OpenAI"
    description: "AI models, ChatGPT, developer platform"
    sources:
      - type: "rss"
        name: "OpenAI News"
        url: "https://openai.com/news/rss.xml"

  - name: "Anthropic"
    description: "Claude and enterprise AI platform"
    sources:
      - type: "website"
        name: "Anthropic News"
        url: "https://www.anthropic.com/news"
      - type: "jobs"
        name: "Anthropic Careers"
        url: "https://www.anthropic.com/careers"

  - name: "Hugging Face"
    description: "Open-source AI model and developer platform"
    sources:
      - type: "rss"
        name: "Hugging Face Blog"
        url: "https://huggingface.co/blog/feed.xml"
      - type: "website"
        name: "Hugging Face Pricing"
        url: "https://huggingface.co/pricing"
